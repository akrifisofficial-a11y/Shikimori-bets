<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Админка</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container admin-container">
    <h1>Добавить аниме</h1>

    <input type="text" id="shiki_url" placeholder="Ссылка Shikimori: https://shikimori.one/animes/60427">
    <input type="text" id="shiki_id" placeholder="ID" readonly>
    <button id="load-btn">Загрузить с Shikimori</button>

    <input type="text" id="title" placeholder="Название">
    <input type="text" id="cover" placeholder="Обложка">
    <input type="text" id="genres" placeholder="Жанры через запятую">
    <textarea id="description" placeholder="Описание"></textarea>

    <button id="save-btn">Сохранить</button>
    <div id="msg"></div>
  </div>
  <script src="admin.js"></script>
</body>
</html>
